<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to right,#00B09B,#96C93D);
    padding:30px;
}

.container{
    width:75%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0B8457;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:vertical;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.save{
    background:green;
}

.reset{
    background:red;
}

.home{
    background:#007BFF;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>📂 My Projects</h1>

<form action="/save_projects" method="POST" enctype="multipart/form-data">

<label>Project Name</label>
<input type="text" name="project_name" placeholder="Enter Project Name" required>

<label>Project Category</label>
<select name="category">
    <option>Web Development</option>
    <option>Python</option>
    <option>Machine Learning</option>
    <option>Artificial Intelligence</option>
    <option>IoT</option>
    <option>Embedded Systems</option>
    <option>Mobile App</option>
    <option>Other</option>
</select>

<label>Technology Used</label>
<input type="text" name="technology"
placeholder="Example: HTML, CSS, JavaScript, Flask, SQLite">

<label>Project Duration</label>
<input type="text" name="duration"
placeholder="Example: 2 Months">

<label>GitHub Repository Link</label>
<input type="url" name="github"
placeholder="https://github.com/username/project">

<label>Project Description</label>
<textarea name="description" rows="5"
placeholder="Write about your project..."></textarea>

<label>Project Status</label>
<select name="status">
    <option>Completed</option>
    <option>In Progress</option>
    <option>Upcoming</option>
</select>

<label>Upload Project Image</label>
<input type="file" name="project_image"
accept=".jpg,.jpeg,.png">

<div class="buttons">

<button type="submit" class="save">
💾 Save
</button>

<button type="reset" class="reset">
🔄 Reset
</button>

<button type="button" class="home" onclick="goHome()">
🏠 Home
</button>

</div>

</form>

</div>

<script>

function goHome(){
    window.location.href="/";
}

</script>

</body>
</html>
