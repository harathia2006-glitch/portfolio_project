<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    background:linear-gradient(to right,#ff758c,#ff7eb3);
    padding:30px;

}



.container{

    width:60%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);

}



h1{

    color:#c2185b;
    margin-bottom:25px;

}



.profile-box{

    margin:20px auto;
}



.profile-box img{

    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #c2185b;

}



input[type=file]{

    margin-top:20px;
    padding:10px;
}



.buttons{

    margin-top:30px;
    display:flex;
    justify-content:space-around;

}



button{

    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:16px;
    color:white;
    cursor:pointer;

}



.save{

    background:green;

}



.reset{

    background:red;

}



.home{

    background:#007BFF;

}



button:hover{

    opacity:0.9;

}

</style>

</head>


<body>


<div class="container">


<h1>🖼 My Profile Photo</h1>



<form action="/upload_profile" 
method="POST"
enctype="multipart/form-data">



<div class="profile-box">


<img id="preview"
src="https://via.placeholder.com/180"
alt="Profile Preview">


</div>



<input type="file"
name="profile_photo"
accept=".jpg,.jpeg,.png"
onchange="previewImage(event)">



<div class="buttons">


<button type="submit" class="save">

💾 Save

</button>



<button type="reset" class="reset">

🔄 Reset

</button>



<button type="button" class="home" onclick="goHome()">

🏠 Home

</button>


</div>



</form>



</div>



<script>


function previewImage(event){

    let image = document.getElementById("preview");

    image.src = URL.createObjectURL(event.target.files[0]);

}



function goHome(){

    window.location.href="/";

}


</script>


</body>

</html>
