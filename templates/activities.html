<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activities</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#ff9966,#ff5e62);
    padding:30px;
}

.container{
    width:75%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#d84315;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input[type=text],
input[type=date],
textarea,
select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:vertical;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    color:white;
}

.save{
    background:green;
}

.reset{
    background:red;
}

.home{
    background:#007BFF;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>🎯 Activities</h1>

<form action="/save_activities" method="POST">

<label>Workshop Attended</label>
<input type="text" name="workshop" placeholder="Enter workshop name">

<label>Seminar Attended</label>
<input type="text" name="seminar" placeholder="Enter seminar name">

<label>Internship</label>
<input type="text" name="internship" placeholder="Enter internship details">

<label>Hackathon</label>
<input type="text" name="hackathon" placeholder="Enter hackathon details">

<label>Sports Activity</label>
<input type="text" name="sports" placeholder="Enter sports activity">

<label>Volunteer Work</label>
<input type="text" name="volunteer" placeholder="Enter volunteer work">

<label>Extra Curricular Activities</label>
<textarea name="extracurricular" rows="4"
placeholder="Describe your extracurricular activities"></textarea>

<label>Activity Date</label>
<input type="date" name="activity_date">

<label>Activity Description</label>
<textarea name="description" rows="5"
placeholder="Write about your activity"></textarea>

<div class="buttons">

<button type="submit" class="save">
💾 Save
</button>

<button type="reset" class="reset">
🔄 Reset
</button>

<button type="button" class="home" onclick="goHome()">
🏠 Home
</button>

</div>

</form>

</div>

<script>

function goHome(){
    window.location.href="/";
}

</script>

</body>
</html>
