<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#11998e,#38ef7d);
    padding:30px;
}

.container{
    width:70%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#00695c;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input[type=text], textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.checkbox-group{
    margin-top:10px;
}

.checkbox-group label{
    display:block;
    font-weight:normal;
    margin:8px 0;
}

.buttons{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.save{
    background:green;
}

.reset{
    background:red;
}

.home{
    background:#007BFF;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>💻 Skills</h1>

<form action="/save_skills" method="POST">

<label>Programming Skills</label>

<div class="checkbox-group">

<label><input type="checkbox" name="skills" value="Python"> Python</label>

<label><input type="checkbox" name="skills" value="Java"> Java</label>

<label><input type="checkbox" name="skills" value="C"> C</label>

<label><input type="checkbox" name="skills" value="C++"> C++</label>

<label><input type="checkbox" name="skills" value="HTML"> HTML</label>

<label><input type="checkbox" name="skills" value="CSS"> CSS</label>

<label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>

<label><input type="checkbox" name="skills" value="Flask"> Flask</label>

<label><input type="checkbox" name="skills" value="SQL"> SQL</label>

<label><input type="checkbox" name="skills" value="SQLite"> SQLite</label>

</div>

<label>Technical Skills</label>
<textarea name="technical" rows="4"
placeholder="Example: Web Development, Database Management, Git, Networking"></textarea>

<label>Soft Skills</label>
<textarea name="softskills" rows="4"
placeholder="Example: Leadership, Communication, Teamwork, Problem Solving"></textarea>

<label>Languages Known</label>
<input type="text" name="languages"
placeholder="Example: English, Telugu, Hindi">

<div class="buttons">

<button type="submit" class="save">
💾 Save
</button>

<button type="reset" class="reset">
🔄 Reset
</button>

<button type="button" class="home" onclick="goHome()">
🏠 Home
</button>

</div>

</form>

</div>

<script>

function goHome(){
    window.location.href="/";
}

</script>

</body>
</html>
