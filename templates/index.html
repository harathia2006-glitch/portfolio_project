<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Personal Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

/* Home Section */

.home{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
}

.home h1{
    font-size:55px;
    font-weight:bold;
    text-transform:uppercase;
    text-shadow:3px 3px 5px black;
}

.home p{
    margin-top:20px;
    font-size:24px;
}

.scroll-btn{
    margin-top:40px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:white;
    color:#0077ff;
    font-weight:bold;
    transition:0.3s;
}

.scroll-btn:hover{
    background:#0077ff;
    color:white;
}

/* Menu Section */

.menu{
    min-height:100vh;
    background:#f5f5f5;
    text-align:center;
    padding:50px;
}

.menu h2{
    color:#0077ff;
    font-size:40px;
    margin-bottom:30px;
}

.button-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    max-width:1000px;
    margin:auto;
}

.button-container a{
    text-decoration:none;
}

.button-container button{
    width:100%;
    padding:20px;
    font-size:22px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    transition:0.3s;
}

.button-container button:hover{
    transform:scale(1.05);
}

/* Different Colors */

.about{background:#ff6b6b;}
.education{background:#4CAF50;}
.skills{background:#2196F3;}
.activities{background:#FF9800;}
.achievements{background:#9C27B0;}
.projects{background:#009688;}
.certificates{background:#3F51B5;}
.profile{background:#E91E63;}
.contact{background:#795548;}

footer{
    text-align:center;
    padding:20px;
    background:#222;
    color:white;
}

</style>

</head>

<body>

<!-- Home Section -->

<section class="home">

<h1>THIS WEBSITE IS FOR MYSELF</h1>

<p>
Welcome to My Personal Portfolio Website
</p>

<p>
Store and Manage My Personal Information Easily
</p>

<button class="scroll-btn" onclick="scrollToMenu()">
⬇ Scroll Down
</button>

</section>

<!-- Menu Section -->

<section class="menu" id="menu">

<h2>MY PORTFOLIO</h2>

<div class="button-container">

<a href="/about">
<button class="about">👩 About Me</button>
</a>

<a href="/education">
<button class="education">🎓 Education</button>
</a>

<a href="/skills">
<button class="skills">💻 Skills</button>
</a>

<a href="/activities">
<button class="activities">🎯 Activities</button>
</a>

<a href="/achievements">
<button class="achievements">🏆 Achievements</button>
</a>

<a href="/projects">
<button class="projects">📂 Projects</button>
</a>

<a href="/certificates">
<button class="certificates">📜 Certificates</button>
</a>

<a href="/profile">
<button class="profile">🖼 Profile</button>
</a>

<a href="/contact">
<button class="contact">📞 Contact</button>
</a>

</div>

</section>

<footer>

<h3>© 2026 My Personal Portfolio Website</h3>

</footer>

<script>

function scrollToMenu()
{
    document.getElementById("menu").scrollIntoView({
        behavior:"smooth"
    });
}

</script>

</body>
</html>
