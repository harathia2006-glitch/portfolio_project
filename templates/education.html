<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education Details</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#36d1dc,#5b86e5);
    padding:30px;
}

.container{
    width:70%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0d47a1;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.buttons{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.save{
    background:green;
}

.reset{
    background:red;
}

.home{
    background:#007BFF;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 Education Details</h1>

<form action="/save_education" method="POST">

<label>College Name</label>
<input type="text" name="college" required>

<label>University</label>
<input type="text" name="university" required>

<label>Branch</label>
<input type="text" name="branch" required>

<label>Degree</label>
<select name="degree">
<option>B.Tech</option>
<option>B.Sc</option>
<option>B.Com</option>
<option>B.A</option>
<option>M.Tech</option>
<option>MBA</option>
<option>Other</option>
</select>

<label>Current Year</label>
<select name="year">
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
<option>Completed</option>
</select>

<label>CGPA / Percentage</label>
<input type="text" name="cgpa">

<label>Intermediate College</label>
<input type="text" name="intercollege">

<label>Intermediate Percentage</label>
<input type="text" name="intermarks">

<label>SSC School Name</label>
<input type="text" name="school">

<label>SSC Percentage</label>
<input type="text" name="sscmarks">

<div class="buttons">

<button type="submit" class="save">
💾 Save
</button>

<button type="reset" class="reset">
🔄 Reset
</button>

<button type="button" class="home" onclick="goHome()">
🏠 Home
</button>

</div>

</form>

</div>

<script>
function goHome(){
    window.location.href="/";
}
</script>

</body>
</html>
