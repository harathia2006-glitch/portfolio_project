<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to right,#4facfe,#00f2fe);
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0077ff;
    margin-bottom:25px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:vertical;
}

.buttons{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:12px 25px;
    font-size:17px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.save{
    background:#28a745;
}

.save:hover{
    background:#218838;
}

.reset{
    background:#dc3545;
}

.reset:hover{
    background:#c82333;
}

.back{
    background:#007bff;
}

.back:hover{
    background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h1>👩 About Me</h1>

<form action="/save_about" method="POST">

<label>Full Name</label>
<input type="text" name="fullname" required>

<label>Father's Name</label>
<input type="text" name="father">

<label>Mother's Name</label>
<input type="text" name="mother">

<label>Date of Birth</label>
<input type="date" name="dob">

<label>Gender</label>
<select name="gender">
    <option value="">Select Gender</option>
    <option>Female</option>
    <option>Male</option>
    <option>Other</option>
</select>

<label>Address</label>
<textarea name="address" rows="3"></textarea>

<label>Email</label>
<input type="email" name="email">

<label>Phone Number</label>
<input type="tel" name="phone">

<label>Career Objective</label>
<textarea name="objective" rows="5"
placeholder="Write about your career objective..."></textarea>

<div class="buttons">

<button type="submit" class="save">
💾 Save
</button>

<button type="reset" class="reset">
🔄 Reset
</button>

<button type="button" class="back"
onclick="goHome()">
🏠 Home
</button>

</div>

</form>

</div>

<script>

function goHome()
{
    window.location.href="/";
}

</script>

</body>
</html>
