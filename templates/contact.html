<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Details</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    background:linear-gradient(to right,#667eea,#764ba2);
    padding:30px;

}



.container{

    width:70%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);

}



h1{

    text-align:center;
    color:#5e35b1;
    margin-bottom:25px;

}



label{

    display:block;
    margin-top:15px;
    font-weight:bold;

}



input,
textarea{

    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;

}



textarea{

    resize:vertical;

}



.buttons{

    margin-top:30px;
    display:flex;
    justify-content:space-between;

}



button{

    padding:12px 25px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;

}



.save{

    background:green;

}



.reset{

    background:red;

}



.home{

    background:#007BFF;

}



button:hover{

    opacity:0.9;

}


</style>

</head>


<body>


<div class="container">


<h1>📞 Contact Details</h1>



<form action="/save_contact" method="POST">



<label>Phone Number</label>

<input type="tel"
name="phone"
placeholder="Enter phone number"
required>



<label>Email Address</label>

<input type="email"
name="email"
placeholder="Enter email address"
required>



<label>LinkedIn Profile</label>

<input type="url"
name="linkedin"
placeholder="Enter LinkedIn URL">



<label>GitHub Profile</label>

<input type="url"
name="github"
placeholder="Enter GitHub URL">



<label>Personal Website</label>

<input type="url"
name="website"
placeholder="Enter Website URL">



<label>Address</label>

<textarea name="address"
rows="4"
placeholder="Enter your address"></textarea>



<label>Message</label>

<textarea name="message"
rows="4"
placeholder="Write a message..."></textarea>



<div class="buttons">


<button type="submit" class="save">

💾 Save

</button>



<button type="reset" class="reset">

🔄 Reset

</button>



<button type="button" class="home" onclick="goHome()">

🏠 Home

</button>



</div>



</form>


</div>



<script>


function goHome(){

    window.location.href="/";

}


</script>


</body>

</html>
